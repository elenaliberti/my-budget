<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Budget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div id="sidebar-top">
        <div id="logo">
          <span class="logo-icon">💸</span>
          <div>
            <div class="logo-title">My Budget</div>
            <div class="logo-sub">Personal Finance</div>
          </div>
        </div>
        <ul id="nav-list">
          <li class="nav-item active" data-view="overview">
            <span class="nav-icon">🏠</span><span class="nav-label">Overview</span>
          </li>
          <li class="nav-item" data-view="plan">
            <span class="nav-icon">📋</span><span class="nav-label">Month Plan</span>
          </li>
          <li class="nav-item" data-view="history">
            <span class="nav-icon">📅</span><span class="nav-label">History</span>
          </li>
          <li class="nav-item" data-view="goals">
            <span class="nav-icon">🏆</span><span class="nav-label">Goals</span>
          </li>
          <li class="nav-item" data-view="loans">
            <span class="nav-icon">📉</span><span class="nav-label">Debt Tracker</span>
          </li>
        </ul>
      </div>
      <div id="sidebar-bottom">
        <div id="salary-display">
          <div class="sd-label">Default Monthly Net</div>
          <div class="sd-amount" id="sidebar-salary">—</div>
        </div>
        <div id="health-mini">
          <div>
            <div class="hm-label">Health Score</div>
            <div class="hm-score" id="sidebar-score">—</div>
          </div>
        </div>
        <button id="backup-btn" class="sidebar-backup-btn">
          <span id="backup-icon">☁️</span>
          <span id="backup-label">Back up now</span>
        </button>
        <div id="backup-status" class="backup-status"></div>
      </div>
    </nav>
    <main id="main">
      <div id="view-container"></div>
    </main>
  </div>
  <div id="modal-root"></div>
  <script src="data.js"></script>
  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
